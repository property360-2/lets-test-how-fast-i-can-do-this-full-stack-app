
<!--
  HTML File: admin-journals.html
  Purpose: Administrative journals control panel for global tracking and reviewing of student journal submissions.
  Contains:
    - Main structured records table detailing date, student name, academic week, status, and direct context review button.
    - Global filter widgets for real-time name searching and review-status sorting (All, Pending, Reviewed).
    - Fully responsive synchronized navigation menu bar for fluid administrative routing.
  Integration:
    - Guarded with auth.js session validator for 'admin' authorization profiles.
    - Interacts with admin-utils.js to download global system student maps and filter journal entries.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Journal Submissions | Admin</title>
    <link rel="stylesheet" href="../system-script/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .journal-table {
            width: 100%;
            border-collapse: collapse;
        }
        .journal-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        .journal-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .journal-table tr:hover {
            background: var(--background);
        }
        .status-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .pill-pending { background: #fef3c7; color: #92400e; }
        .pill-reviewed { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../index.html" class="logo">
            <img src="../assets/richwell-colleges-logo.webp" alt="Logo" style="height: 40px;">
            <span class="hide-mobile" style="font-size: 0.7rem; color: var(--secondary); margin-left: 0.5rem; background: rgba(236, 72, 153, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px;">ADMIN</span>
        </a>
        <button id="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="nav-links">
            <a id="nav-overview" href="admin-dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Overview</a>
            <a id="nav-students" href="admin-students.html" class="nav-link"><i class="fas fa-users"></i> Students</a>
            <a id="nav-journals" href="admin-journals.html" class="nav-link active"><i class="fas fa-book"></i> Journals</a>
            <a id="nav-archives" href="admin-archives.html" class="nav-link"><i class="fas fa-archive"></i> Archives</a>
        </div>
        <div>
            <button id="logout-btn" class="btn btn-outline" style="padding: 0.5rem 1rem;">
                <i class="fas fa-sign-out-alt"></i> <span class="hide-mobile">Logout</span>
            </button>
        </div>
    </nav>

    <div class="container animate-fade">
        <div class="page-header">
            <div>
                <h1>Journal Submissions</h1>
                <p style="color: var(--text-muted);">Global history of all student journal entries.</p>
            </div>
        </div>

        <div class="filter-bar">
            <div class="glass-card" style="padding: 0.5rem 1rem; flex: 1; display: flex; gap: 1rem; align-items: center;">
                <i class="fas fa-filter" style="color: var(--text-muted);"></i>
                <select id="status-filter" style="border: none; background: transparent; width: auto; font-weight: 600;">
                    <option value="all">All Status</option>
                    <option value="pending">Pending Review</option>
                    <option value="reviewed">Reviewed</option>
                </select>
                <div style="width: 1px; height: 20px; background: var(--border);"></div>
                <input type="text" id="name-search" placeholder="Search student name..." style="border: none; background: transparent; flex: 1;">
            </div>
        </div>

        <div class="glass-card" style="padding: 0; overflow-x: auto;">
            <table class="journal-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Student</th>
                        <th>Week</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="journal-list-body">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 3rem;">Loading journals...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="minimal-footer">
        <p>
            <a href="../terms.html">Terms & Conditions</a>
            <span>Developed by Jun Alvior</span>
        </p>
    </footer>

    <script type="module">
        import { logoutUser, guardPage } from '../system-script/auth.js';
        import { getAllJournals, getAllStudents } from '../system-script/admin-utils.js';
        import { showToast, setupHamburgerMenu } from '../system-script/ui-utils.js';

        guardPage('admin');
        setupHamburgerMenu();
        document.getElementById('logout-btn').addEventListener('click', logoutUser);

        let journals = [];
        let studentsMap = {};

        /**
         * Initializes the global administrative journals tracker page.
         * Fetches all registered students to map Firestore UIDs to human-readable names,
         * configures mobile interactive navigation UI, and triggers standard journals database query load.
         *
         * @async
         * @function init
         * @returns {Promise<void>} Resolves when the full list of students has been cached and journals are loaded.
         */
        async function init() {
            try {
                // Fetch students first to map names
                const students = await getAllStudents();
                students.forEach(s => studentsMap[s.id] = `${s.firstName} ${s.lastName}`);
                
                // Fetch journals
                await loadJournals();
            } catch (error) {
                console.error(error);
                showToast('Failed to load data.', 'error');
            }
        }

        /**
         * Asynchronously queries the database for student journal entries based on selected review status.
         * Renders loading skeletons/status markup and delegates table rendering upon successful data fetching.
         *
         * @async
         * @function loadJournals
         * @returns {Promise<void>} Resolves when the journals matching selected filters are populated.
         */
        async function loadJournals() {
            const status = document.getElementById('status-filter').value;
            try {
                document.getElementById('journal-list-body').innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 3rem;">Fetching...</td></tr>';
                journals = await getAllJournals(status);
                renderJournals(journals);
            } catch (error) {
                showToast('Error fetching journals.', 'error');
            }
        }

        /**
         * Filters the journal list client-side based on the current search input value,
         * maps individual student names, and renders clean tabular display cards in the table.
         * If no matching journals are found, presents an elegant fallback layout.
         *
         * @function renderJournals
         * @param {Array<Object>} list - The array of raw student journal entries.
         * @param {string} list[].userId - Target student UID for mapping.
         * @param {string} list[].date - Submission date formatted string.
         * @param {number} list[].week - Academic program week number of submission.
         * @param {boolean} list[].reviewed - Validation state of student entry review.
         * @returns {void}
         */
        function renderJournals(list) {
            const body = document.getElementById('journal-list-body');
            const searchTerm = document.getElementById('name-search').value.toLowerCase();
            
            const filtered = list.filter(j => {
                const name = studentsMap[j.userId] || 'Unknown Student';
                return name.toLowerCase().includes(searchTerm);
            });

            if (filtered.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 3rem;">No journals found.</td></tr>';
                return;
            }

            body.innerHTML = filtered.map(j => `
                <tr>
                    <td style="font-weight: 600;">${new Date(j.date).toLocaleDateString(undefined, { dateStyle: 'medium' })}</td>
                    <td>
                        <div style="font-weight: 500;">${studentsMap[j.userId] || 'Unknown Student'}</div>
                    </td>
                    <td>Week ${j.week}</td>
                    <td>
                        <span class="status-pill ${j.reviewed ? 'pill-reviewed' : 'pill-pending'}">
                            ${j.reviewed ? 'Reviewed' : 'Pending'}
                        </span>
                    </td>
                    <td>
                        <button onclick="reviewJournal('${j.userId}', '${j.id}', '${j.date}')" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">
                            Review
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        /**
         * Mounts chosen student target state in session storage and redirects the client,
         * allowing context-aware review of individual log entries.
         *
         * @function reviewJournal
         * @param {string} uid - Target student's unique user account ID.
         * @param {string} id - The specific document ID of the journal entry in Firestore.
         * @param {string} date - Particular entry log date identifier.
         * @returns {void} Redirects window location.
         */
        window.reviewJournal = (uid, id, date) => {
            sessionStorage.setItem('selectedStudentUid', uid);
            window.location.href = `admin-journal-review.html?uid=${uid}&id=${id}&date=${date}&from=journals`;
        };

        document.getElementById('status-filter').addEventListener('change', loadJournals);
        document.getElementById('name-search').addEventListener('input', () => renderJournals(journals));

        init();
    </script>
</body>
</html>
