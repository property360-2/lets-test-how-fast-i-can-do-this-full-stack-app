<!--
  HTML File: admin-journal-review.html
  Purpose: Administrative panel for detailed inspection, evaluation, and grading/remarking of a student's daily OJT journal entry.
  Contains:
    - Content inspector rendering the raw journal text body submitted by the student.
    - Remarks text-area form enabling administrators to submit feedback and flag journals as reviewed/completed.
    - Synchronized navigation bar layout with all administrator views.
  Integration:
    - Guarded with auth.js session validator for 'admin' user profiles.
    - Interfaces with admin-utils.js to fetch a particular journal entry log by ID or date, and records remarks/review-status updates.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Journal | Admin</title>
    <link rel="stylesheet" href="../system-script/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .review-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .journal-content-box {
            background: var(--background);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../index.html" class="logo">
            <img src="../assets/richwell-colleges-logo.webp" alt="Logo" style="height: 40px;">
            <span class="hide-mobile" style="font-size: 0.7rem; color: var(--secondary); margin-left: 0.5rem; background: rgba(236, 72, 153, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px;">ADMIN</span>
        </a>
        <button id="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="nav-links">
            <a id="nav-overview" href="admin-dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Overview</a>
            <a id="nav-students" href="admin-students.html" class="nav-link"><i class="fas fa-users"></i> Students</a>
            <a id="nav-journals" href="admin-journals.html" class="nav-link"><i class="fas fa-book"></i> Journals</a>
            <a id="nav-archives" href="admin-archives.html" class="nav-link"><i class="fas fa-archive"></i> Archives</a>
        </div>
        <div>
            <button id="logout-btn" class="btn btn-outline" style="padding: 0.5rem 1rem;">
                <i class="fas fa-sign-out-alt"></i> <span class="hide-mobile">Logout</span>
            </button>
        </div>
    </nav>

    <div class="container animate-fade">
        <div class="review-container">
            <a id="back-link" href="#" class="btn btn-outline" style="margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.3s ease;">
                <i class="fas fa-arrow-left"></i> Back to Calendar
            </a>

            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                    <div>
                        <h1 id="review-date" style="margin-bottom: 0.5rem;">Loading...</h1>
                        <div style="display: flex; gap: 0.5rem;">
                            <span id="review-week" class="badge badge-outline">Week 0</span>
                            <span id="review-status" class="badge">Status</span>
                        </div>
                    </div>
                </div>

                <div id="journal-content" class="journal-content-box">
                    Loading journal content...
                </div>

                <form id="review-form">
                    <div class="input-group">
                        <label>Admin Remarks / Feedback <span style="font-weight: normal; color: var(--text-muted); font-size: 0.8rem;">(Optional)</span></label>
                        <textarea id="review-remarks" rows="5" placeholder="Add feedback for the student..."></textarea>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <button type="submit" id="review-btn" class="btn btn-primary" style="flex: 1;">
                            <i class="fas fa-check-double"></i> Mark as Reviewed
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="minimal-footer">
        <p>
            <a href="../terms.html">Terms & Conditions</a>
            <span>Developed by Jun Alvior</span>
        </p>
    </footer>

    <script type="module">
        /**
         * Admin Journal Review Module
         * Facilitates the evaluation of individual student journal entries.
         * Allows admins to provide feedback (remarks) and approve/reject submissions.
         */
        import { db } from '../system-script/firebase-core.js';
        import { logoutUser, guardPage } from '../system-script/auth.js';
        import { getJournal } from '../system-script/journal-utils.js';
        import { reviewJournal } from '../system-script/admin-utils.js';
        import { showToast, escapeHTML, setupHamburgerMenu } from '../system-script/ui-utils.js';

        guardPage('admin');
        setupHamburgerMenu();
        document.getElementById('logout-btn').addEventListener('click', logoutUser);

        const urlParams = new URLSearchParams(window.location.search);
        const studentUid = urlParams.get('uid');
        const journalId = urlParams.get('id');
        const journalDate = urlParams.get('date');
        const fromPage = urlParams.get('from');

        if (!studentUid || !journalId || !journalDate) {
            showToast('Missing required parameters.', 'error');
            setTimeout(() => window.location.href = 'admin-students.html', 1500);
        }

        /**
         * Dynamically adjusts the navigation header highlights and sets the back-link URL
         * based on the context parameter 'from' that tracks where the admin came from.
         *
         * @function setupDynamicNavigation
         * @returns {void}
         */
        function setupDynamicNavigation() {
            const backLink = document.getElementById('back-link');
            
            // First clear any default active navigation highlight
            document.querySelectorAll('.nav-links .nav-link').forEach(link => {
                link.classList.remove('active');
            });

            if (fromPage === 'dashboard') {
                backLink.href = 'admin-dashboard.html';
                backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Dashboard';
                document.getElementById('nav-overview')?.classList.add('active');
            } else if (fromPage === 'journals') {
                backLink.href = 'admin-journals.html';
                backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Journals';
                document.getElementById('nav-journals')?.classList.add('active');
            } else {
                backLink.href = `admin-student.html?uid=${studentUid}`;
                backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Calendar';
                document.getElementById('nav-students')?.classList.add('active');
            }
        }

        setupDynamicNavigation();

        /**
         * Initializes the journal review interface by loading parameters,
         * fetching student logs, and updating form inputs with current entry details.
         * Resolves fallback options by querying direct Firestore records by ID if standard date lookups fail.
         *
         * @async
         * @function init
         * @returns {Promise<void>} Resolves when the selected journal record information has been successfully displayed.
         */
        async function init() {
            try {
                // Try fetching by user and date first
                let journal = await getJournal(studentUid, journalDate);
                
                // Fallback: Try fetching by specific ID if user/date lookup fails
                if (!journal && journalId) {
                    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js");
                    const docSnap = await getDoc(doc(db, "journals", journalId));
                    if (docSnap.exists()) {
                        journal = { id: docSnap.id, ...docSnap.data() };
                    }
                }

                if (!journal) throw new Error('Journal not found');

                // Update UI with journal data
                document.getElementById('review-date').textContent = new Date(journal.date).toLocaleDateString(undefined, { dateStyle: 'full' });
                document.getElementById('review-week').textContent = `Week ${journal.week}`;
                document.getElementById('journal-content').textContent = journal.content;
                document.getElementById('review-remarks').value = journal.remarks || '';
                
                const status = document.getElementById('review-status');
                status.textContent = journal.reviewed ? 'Reviewed' : 'Pending Review';
                status.className = `badge ${journal.reviewed ? 'badge-success' : 'badge-warning'}`;

                // If already reviewed, update button text
                if (journal.reviewed) {
                    document.querySelector('#review-form button').innerHTML = '<i class="fas fa-save"></i> Update Remarks';
                }
            } catch (error) {
                console.error(error);
                showToast('Error loading journal: ' + error.message, 'error');
            }
        }

        /**
         * Submission controller processing the administrative review updates.
         * Submits teacher/admin remarks and sets reviewed status flags to true in Firestore.
         * Disables and animates submit button during active network transaction requests.
         *
         * @async
         * @function handleReview
         * @returns {Promise<void>} Resolves when the review has been successfully submitted and UI reloaded.
         */
        async function handleReview() {
            const remarks = document.getElementById('review-remarks').value;
            try {
                const reviewBtn = document.getElementById('review-btn');
                reviewBtn.disabled = true;
                reviewBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

                // Use the explicit journalId from URL since it's the most reliable for updates
                await reviewJournal(journalId, remarks, true);
                showToast('Journal reviewed successfully!', 'success');
                
                await init();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            } finally {
                document.getElementById('review-btn').disabled = false;
            }
        }

        document.getElementById('review-form').addEventListener('submit', (e) => {
            e.preventDefault();
            handleReview();
        });

        init();
    </script>
</body>
</html>
