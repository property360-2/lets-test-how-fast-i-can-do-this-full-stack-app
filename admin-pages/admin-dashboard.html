
<!--
  HTML File: admin-dashboard.html
  Purpose: Administrative dashboard providing a high-level summary of OJT student progress.
  Contains:
    - OJT statistics dashboard cards (Active Students, Total Journals, Pending Reviews).
    - Latest pending activity feed with direct links to review submissions.
    - Responsive global navigation bar synchronized across the admin panel.
    - Interactive motivational random quotes loader.
  Integration:
    - Verifies user role using auth.js guardPage('admin').
    - Consumes admin-utils.js to fetch system statistics and pending journal listings.
    - Utilizes ui-utils.js for standard hamburger responsive navigation drawer actions.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <link rel="stylesheet" href="../system-script/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .activity-item:last-child {
            border-bottom: none;
        }
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../index.html" class="logo">
            <img src="../assets/richwell-colleges-logo.webp" alt="Logo" style="height: 40px;">
            <span class="hide-mobile" style="font-size: 0.7rem; color: var(--secondary); margin-left: 0.5rem; background: rgba(236, 72, 153, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px;">ADMIN</span>
        </a>
        <button id="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="nav-links">
            <a id="nav-overview" href="admin-dashboard.html" class="nav-link active"><i class="fas fa-chart-line"></i> Overview</a>
            <a id="nav-students" href="admin-students.html" class="nav-link"><i class="fas fa-users"></i> Students</a>
            <a id="nav-journals" href="admin-journals.html" class="nav-link"><i class="fas fa-book"></i> Journals</a>
            <a id="nav-archives" href="admin-archives.html" class="nav-link"><i class="fas fa-archive"></i> Archives</a>
        </div>
        <div>
            <button id="logout-btn" class="btn btn-outline" style="padding: 0.5rem 1rem;">
                <i class="fas fa-sign-out-alt"></i> <span class="hide-mobile">Logout</span>
            </button>
        </div>
    </nav>

    <div class="container animate-fade">
        <header style="margin-bottom: 2.5rem;">
            <h1>Administrator Overview</h1>
            <p style="color: var(--text-muted);">Monitor student submissions and manage OJT records.</p>
        </header>

        <div class="stats-grid">
            <div class="glass-card stat-card">
                <div class="stat-value" id="stat-students">0</div>
                <label>Active Students</label>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-value" id="stat-journals">0</div>
                <label>Total Journals</label>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-value" id="stat-pending" style="background: linear-gradient(135deg, var(--warning), var(--danger)); -webkit-background-clip: text; background-clip: text;">0</div>
                <label>Pending Reviews</label>
            </div>
        </div>

        <div class="glass-card animate-fade" style="margin-bottom: 2.5rem;">
            <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-clipboard-list" style="color: var(--primary);"></i> Pending Reviews
            </h2>
            <div id="activity-feed" class="action-grid">
                <!-- Dynamic pending review activity will be loaded here -->
            </div>
        </div>

        <div id="quote-container" class="glass-card animate-fade" style="animation-delay: 0.4s; text-align: center; padding: 2rem; margin-top: 1rem;">
            <div id="quote-skeleton">
                <div class="skeleton" style="height: 20px; width: 80%; margin: 0 auto 1rem;"></div>
                <div class="skeleton" style="height: 15px; width: 30%; margin: 0 auto;"></div>
            </div>
            <div id="quote-content" style="display: none;">
                <p id="quote-text" style="font-size: 1.25rem; font-style: italic; color: var(--text); margin-bottom: 0.75rem; font-family: 'Outfit', sans-serif;"></p>
                <p id="quote-author" style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600;"></p>
            </div>
        </div>
    </div>

    <footer class="minimal-footer">
        <p>
            <a href="../terms.html">Terms & Conditions</a>
            <span>Developed by Jun Alvior</span>
        </p>
    </footer>

    <script type="module">
        /**
         * Admin Dashboard Module
         * Manages the analytical summary of OJT progress, including total students,
         * pending journal reviews, and overall submission statistics.
         */
        import { logoutUser, guardPage } from '../system-script/auth.js';
        import { getAdminStats, getAllJournals, getAllStudents } from '../system-script/admin-utils.js';
        import { setupHamburgerMenu } from '../system-script/ui-utils.js';

        guardPage('admin');
        setupHamburgerMenu();
        document.getElementById('logout-btn').addEventListener('click', logoutUser);

        /**
         * Asynchronously loads and renders administrative analytical summary stats.
         * Fetches stats, pending journals, and the student list concurrently via Promise.all
         * to minimize load time. Builds a uid→student lookup map so renderActivity can
         * display the actual student name and section for each pending entry.
         *
         * @async
         * @function loadDashboard
         * @returns {Promise<void>} Resolves when all dashboard data is loaded and rendered.
         */
        async function loadDashboard() {
            try {
                // Fetch all three in parallel — no sequential waterfall needed
                const [stats, journals, students] = await Promise.all([
                    getAdminStats(),
                    getAllJournals('pending'),
                    getAllStudents()
                ]);

                document.getElementById('stat-students').textContent = stats.totalStudents;
                document.getElementById('stat-journals').textContent = stats.totalJournals;
                document.getElementById('stat-pending').textContent = stats.pendingReviews;

                // Build O(1) uid → student map so renderActivity doesn't need extra fetches
                const studentMap = new Map(students.map(s => [s.id, s]));
                renderActivity(journals.slice(0, 5), studentMap);
            } catch (error) {
                console.error(error);
            }
        }

        /**
         * Renders the activity feed for the most recent pending journal submissions.
         * Displays the student's real name, section, company, and a formatted date
         * instead of the generic "New Journal Submitted" placeholder.
         *
         * @function renderActivity
         * @param {Array<Object>} journals - An array of raw pending journal entry objects.
         * @param {string} journals[].userId - The Firestore uid of the submitting student.
         * @param {string} journals[].id - The journal document ID in Firestore.
         * @param {string} journals[].date - The YYYY-MM-DD date string of the journal entry.
         * @param {Map<string, Object>} studentMap - uid → student object lookup map.
         * @returns {void} Direct structural UI updates.
         */
        function renderActivity(journals, studentMap) {
            const feed = document.getElementById('activity-feed');
            if (journals.length === 0) {
                feed.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No pending reviews.</p>';
                return;
            }

            feed.innerHTML = journals.map(j => {
                const student = studentMap.get(j.userId);

                // Graceful fallback if student record is not found in the map
                const studentName = student
                    ? `${student.firstName} ${student.lastName}`
                    : 'Unknown Student';
                const studentDetail = student
                    ? `${student.section} &middot; ${student.company}`
                    : 'No details available';

                // Format YYYY-MM-DD → "March 4, 2026" — force UTC noon to avoid timezone shifts
                const formattedDate = new Date(`${j.date}T12:00:00Z`).toLocaleDateString('en-US', {
                    month: 'long', day: 'numeric', year: 'numeric'
                });

                return `
                    <div class="activity-item">
                        <div class="activity-icon"><i class="fas fa-user-circle"></i></div>
                        <div style="flex: 1; min-width: 0;">
                            <div style="font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${studentName}</div>
                            <div style="font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${studentDetail}</div>
                            <div style="font-size: 0.78rem; color: var(--primary); margin-top: 3px; font-weight: 500;">
                                <i class="fas fa-calendar-alt" style="font-size: 0.7rem;"></i> ${formattedDate}
                            </div>
                        </div>
                        <button onclick="reviewJournalEntry('${j.userId}', '${j.id}', '${j.date}')" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; flex-shrink: 0;">Review</button>
                    </div>
                `;
            }).join('');
        }

        /**
         * Sets global window navigation context for reviewing a specific student journal entry.
         * Stores the student target identifier in session cache, redirecting to the detail page.
         *
         * @function reviewJournalEntry
         * @param {string} uid - Unique Firestore user identifier for the student.
         * @param {string} id - The specific document ID of the journal entry in Firestore.
         * @param {string} date - Formatted date string corresponding to the journal entry.
         * @returns {void} Redirects client browser window.
         */
        window.reviewJournalEntry = (uid, id, date) => {
            sessionStorage.setItem('selectedStudentUid', uid);
            window.location.href = `admin-journal-review.html?uid=${uid}&id=${id}&date=${date}&from=dashboard`;
        };

        loadDashboard();

        /**
         * Fetches a compilation of motivational and inspirational professional quotes,
         * and renders a randomly chosen quote to keep administrators motivated.
         * Gracefully handles failure by hiding the widget block altogether.
         *
         * @async
         * @function loadRandomQuote
         * @returns {Promise<void>} Resolves when the motivational quote is successfully loaded and rendered.
         */
        async function loadRandomQuote() {
            try {
                const response = await fetch('../assets/quotes.json');
                const quotes = await response.json();
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                
                document.getElementById('quote-skeleton').style.display = 'none';
                document.getElementById('quote-content').style.display = 'block';
                document.getElementById('quote-text').textContent = `“${randomQuote.quote}”`;
                document.getElementById('quote-author').textContent = `— ${randomQuote.author}`;
            } catch (error) {
                console.error("Quote Load Error:", error);
                document.getElementById('quote-container').style.display = 'none';
            }
        }

        loadRandomQuote();
    </script>
</body>
</html>
